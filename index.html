<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>VR Room</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#111}
  #c{width:100%;height:100%;touch-action:none;display:block}
  #msg{position:fixed;top:10px;left:10px;color:#fff;font-family:sans-serif;
       background:rgba(0,0,0,.55);padding:8px 12px;border-radius:8px;z-index:10;
       font-size:15px;line-height:1.5;white-space:pre;max-width:90vw}
</style>
<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
<script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>
</head>
<body>
<div id="msg">加载中…</div>
<canvas id="c"></canvas>
<script>
const msg = document.getElementById('msg');
const canvas = document.getElementById('c');
const engine = new BABYLON.Engine(canvas, true, { stencil:true });
const scene = new BABYLON.Scene(engine);
scene.clearColor = new BABYLON.Color4(0.12, 0.12, 0.14, 1);

// ===== 可调参数（想改默认值就动这里）=====
let baseSpeed = 0.10;      // 移动速度（左手 X/Y 键运行时可调）
const V_SPEED  = 1.2;      // 上下升降速度（米/秒）
const SPRINT_X = 3;        // 冲刺倍数
const TURN_SPEED = 0.20;   // 转向速度
let hemiIntensity = 1.0;   // 环境光亮度
// =========================================

const hemi = new BABYLON.HemisphericLight('h', new BABYLON.Vector3(0.2, 1, 0.1), scene);
hemi.intensity = hemiIntensity;

const camera = new BABYLON.UniversalCamera('cam', new BABYLON.Vector3(0, 1.6, -3), scene);
camera.attachControl(canvas, true);
camera.minZ = 0.05;
camera.speed = 0.25;

const ROOT = "https://cdn.jsdelivr.net/gh/value1000-lang/vr-model@main/";
const FILE = "glb_furnished_VR_nolights.glb";

let startPos = new BABYLON.Vector3(0, 1.6, 0);

function controlsText(){
  return "已加载 ✓  点右下角「进入 VR」\n" +
         "移动: 左摇杆   转向: 右摇杆\n" +
         "上升/下降: 右手 A/B\n" +
         "加速/减速: 左手 Y/X   冲刺: 右扳机\n" +
         "回中心: 左手 Grip   退出VR: 长按右手B 2秒\n" +
         "速度: " + baseSpeed.toFixed(2);
}

BABYLON.SceneLoader.ImportMeshAsync("", ROOT, FILE, scene, (e) => {
  if (e && e.lengthComputable) msg.textContent = '加载中… ' + Math.floor(e.loaded / e.total * 100) + '%';
}).then(async (result) => {
  // 包围盒 → 房间中心、眼高 1.6m
  let min = new BABYLON.Vector3(1e9,1e9,1e9), max = new BABYLON.Vector3(-1e9,-1e9,-1e9);
  result.meshes.forEach(m => {
    if (m.getTotalVertices() > 0) {
      const b = m.getBoundingInfo().boundingBox;
      min = BABYLON.Vector3.Minimize(min, b.minimumWorld);
      max = BABYLON.Vector3.Maximize(max, b.maximumWorld);
    }
  });
  const center = min.add(max).scale(0.5);
  startPos = new BABYLON.Vector3(center.x, min.y + 1.6, center.z);
  camera.position = startPos.clone();
  msg.textContent = controlsText();

  // WebXR：进入按钮 + 左摇杆移动 / 右摇杆转向
  const xr = await scene.createDefaultXRExperienceAsync({ disableTeleportation: true });
  const cam = xr.baseExperience.camera;
  const fm = xr.baseExperience.featuresManager;
  const mv = fm.enableFeature(BABYLON.WebXRFeatureName.MOVEMENT, 'latest', {
    xrInput: xr.input, movementSpeed: baseSpeed, rotationSpeed: TURN_SPEED
  });

  xr.baseExperience.onStateChangedObservable.add(s => {
    if (s === BABYLON.WebXRState.IN_XR) cam.position = startPos.clone();
  });

  // 手腕操作面板（贴在左手柄上）
  let panelText = null;
  function updatePanel(){
    if (panelText) panelText.text =
      "速度 " + baseSpeed.toFixed(2) + "  高度 " + cam.position.y.toFixed(1) + "m\n" +
      "移动:左摇杆  转向:右摇杆\n上升/下降:A/B  加减速:Y/X\n冲刺:右扳机  回中心:左Grip\n长按右手B 2秒 退出VR";
  }

  // 绑定手柄按键
  xr.input.onControllerAddedObservable.add(c => {
    c.onMotionControllerInitObservable.add(mc => {
      if (mc.handedness === 'left') {
        // 手腕面板
        if (c.grip) {
          const plane = BABYLON.MeshBuilder.CreatePlane('panel', { width:0.16, height:0.09 }, scene);
          plane.parent = c.grip;
          plane.position = new BABYLON.Vector3(0, 0.04, 0.05);
          plane.rotation = new BABYLON.Vector3(Math.PI/3, 0, 0);
          const adt = BABYLON.GUI.AdvancedDynamicTexture.CreateForMesh(plane, 512, 288);
          const tb = new BABYLON.GUI.TextBlock();
          tb.color = 'white'; tb.fontSize = 34; tb.textWrapping = true;
          adt.addControl(tb); panelText = tb; updatePanel();
        }
        const x = mc.getComponent('x-button');
        const y = mc.getComponent('y-button');
        const g = mc.getComponent('xr-standard-squeeze');
        x && x.onButtonStateChangedObservable.add(() => { if (x.pressed){ baseSpeed = Math.max(0.02, baseSpeed - 0.02); mv.movementSpeed = baseSpeed; updatePanel(); msg.textContent = controlsText(); }});
        y && y.onButtonStateChangedObservable.add(() => { if (y.pressed){ baseSpeed = Math.min(0.40, baseSpeed + 0.02); mv.movementSpeed = baseSpeed; updatePanel(); msg.textContent = controlsText(); }});
        g && g.onButtonStateChangedObservable.add(() => { if (g.pressed){ cam.position = startPos.clone(); updatePanel(); }});
      }
    });
  });

  // 每帧：右手 A/B 升降 + 右扳机冲刺 + 右手B长按2秒退出VR
  let bHoldStart = 0;
  scene.onBeforeRenderObservable.add(() => {
    if (!xr.baseExperience || xr.baseExperience.state !== BABYLON.WebXRState.IN_XR) return;
    const dt = engine.getDeltaTime() / 1000;
    let up = 0, sprint = false, bHeld = false;
    xr.input.controllers.forEach(c => {
      const mc = c.motionController; if (!mc) return;
      if (mc.handedness === 'right') {
        const a = mc.getComponent('a-button');
        const b = mc.getComponent('b-button');
        const tr = mc.getComponent('xr-standard-trigger');
        if (a && a.pressed) up += 1;
        if (b && b.pressed) { up -= 1; bHeld = true; }
        if (tr && tr.value > 0.5) sprint = true;
      }
    });
    // 右手 B 键长按 2 秒退出 VR
    if (bHeld) {
      if (!bHoldStart) bHoldStart = performance.now();
      else if (performance.now() - bHoldStart > 2000) { bHoldStart = 0; xr.baseExperience.exitXRAsync(); }
    } else { bHoldStart = 0; }
    if (up !== 0) { cam.position.y += up * V_SPEED * dt; updatePanel(); }
    mv.movementSpeed = sprint ? baseSpeed * SPRINT_X : baseSpeed;
  });

}).catch(err => {
  msg.textContent = '模型加载失败：' + (err.message || err);
});

engine.runRenderLoop(() => scene.render());
window.addEventListener('resize', () => engine.resize());
</script>
</body>
</html>
